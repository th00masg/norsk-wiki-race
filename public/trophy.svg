<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Cup body -->
  <path d="M25 15 L25 55 Q25 80 50 85 Q75 80 75 55 L75 15Z" fill="#FFB800" opacity="0.9"/>
  <path d="M30 15 L30 53 Q30 75 50 80 Q70 75 70 53 L70 15Z" fill="#FFD54F"/>
