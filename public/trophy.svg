  <!-- Left handle -->
  <path d="M25 25 Q10 25 10 42 Q10 55 25 55" stroke="#FFB800" stroke-width="4" fill="none"/>
  <!-- Right handle -->
  <path d="M75 25 Q90 25 90 42 Q90 55 75 55" stroke="#FFB800" stroke-width="4" fill="none"/>
  <!-- Rim -->
  <rect x="22" y="12" width="56" height="6" rx="3" fill="#FFD54F" stroke="#FFB800" stroke-width="1"/>
  <!-- Star on cup -->
  <polygon points="50,35 53,44 62,44 55,50 57,59 50,54 43,59 45,50 38,44 47,44" fill="#FF5757" opacity="0.8"/>
  <!-- Stem -->
  <rect x="43" y="85" width="14" height="12" rx="2" fill="#FFB800"/>
  <!-- Base -->
  <rect x="30" y="97" width="40" height="8" rx="4" fill="#FFB800"/>
  <rect x="33" y="100" width="34" height="4" rx="2" fill="#FFD54F"/>
</svg>
